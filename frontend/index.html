<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGenie - AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 StudyGenie</h1>
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="chat">💬 Chat</button>
            <button class="mode-btn" data-mode="eli5">🧒 Explain Like I'm 5</button>
            <button class="mode-btn" data-mode="mcq">🎯 Exam Mode (MCQs)</button>
        </div>
        <div id="chat-container">
            <div id="messages"></div>
        </div>
        <div id="stats"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask me anything about your studies...">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
